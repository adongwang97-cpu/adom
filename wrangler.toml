name = "adom"
main = "src/worker.js"
compatibility_date = "2024-09-23"

[assets]
directory = "./"
binding = "ASSETS"

# D1 資料庫綁定：寫在這裡才不會被每次 `wrangler deploy` 自動部署沖掉
# (儀表板手動加的 binding 沒寫進這檔案的話，下次 push 部署會被重置成沒綁定)
[[d1_databases]]
binding = "DB"
database_name = "adom-db"
database_id = "fb5de068-efad-482e-a152-79d13732e39e"

# 頻道自動發文排程：每小時觸發一次
# - 指定日期發文：每小時檢查，時間到了就發(準度1小時內)
# - 輪播池(沒指定日期)：只在 UTC 12點=台灣晚上20點發一則，每天一次
[triggers]
crons = ["0 * * * *"]

# ── 以下要在 CF 儀表板手動加(見 使用說明.txt「後台設定」章節)──
# Secrets → ADMIN_PASS(後台密碼) / ADMIN_SECRET(簽章用亂碼,不用記) / OXAPAY_API_KEY(抖內金流，阿東專屬)
#         / TG_BOT_TOKEN(@Adombaby520_bot 的 API token，頻道自動發文用)
# Secrets 不受這個問題影響，設定後不會被 deploy 沖掉，不用寫進這個檔案。
